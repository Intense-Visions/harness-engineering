name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

      - name: Test (with coverage on ubuntu)
        run: ${{ matrix.os == 'ubuntu-latest' && 'pnpm test:ci' || 'pnpm test' }}

      - name: Coverage ratchet check
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/coverage-ratchet.mjs

      - name: Verify generated docs are fresh
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run generate-docs --check

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: packages/core/coverage/coverage-final.json,packages/graph/coverage/coverage-final.json,packages/cli/coverage/coverage-final.json,packages/eslint-plugin/coverage/coverage-final.json,packages/linter-gen/coverage/coverage-final.json,packages/orchestrator/coverage/coverage-final.json,packages/types/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - run: pnpm test:platform-parity
