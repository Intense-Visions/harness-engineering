version: 1
name: Architecture Enforcer
description: Validates architectural constraints and dependency rules
role: Enforce layer boundaries, detect circular dependencies, block forbidden imports
skills:
  - enforce-architecture
  - check-mechanical-constraints
  - harness-dependency-health
commands:
  - check-deps
  - validate
triggers:
  - event: on_pr
    conditions:
      paths: ["src/**"]
  - event: on_commit
    conditions:
      branches: ["main", "develop"]
  - event: scheduled
    cron: "0 6 * * 1"
config:
  severity: error
  autoFix: false
  timeout: 300000
outputs:
  agents-md: true
  ci-workflow: true
  runtime-config: true
