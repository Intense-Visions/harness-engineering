version: 2
name: Task Executor
description: Executes approved plans with state tracking, TDD, and verification
role: >
  Execute implementation plans task-by-task using harness methodology.
  Maintains persistent state, follows TDD rhythm, runs verification
  after each task, and respects checkpoint protocol.
skills:
  - harness-execution
steps:
  - command: validate
    when: always
  - command: check-deps
    when: always
  - command: scan
    when: on_task_complete
  - skill: harness-execution
    when: on_plan_approved
    output: auto
  - skill: harness-execution
    when: manual
    output: auto
triggers:
  - event: on_pr
    conditions:
      paths:
        - "src/**"
        - "packages/**"
  - event: on_commit
    conditions:
      branches:
        - main
        - develop
config:
  severity: error
  autoFix: false
  timeout: 900000
outputs:
  agents-md: true
  ci-workflow: true
  runtime-config: true
