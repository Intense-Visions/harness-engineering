name: align-documentation
version: "1.0.0"
description: Auto-fix documentation drift issues
stability: static
cognitive_mode: meticulous-verifier
triggers:
  - manual
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
cli:
  command: harness skill run align-documentation
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: align-documentation
    path: string
type: flexible
internal: true
state:
  persistent: false
  files: []
depends_on:
  - detect-doc-drift
