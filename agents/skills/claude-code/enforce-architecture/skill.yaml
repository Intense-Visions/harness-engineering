name: enforce-architecture
version: "1.1.0"
description: Validate architectural layer boundaries, detect violations, and auto-fix import ordering and forbidden import replacement
stability: static
cognitive_mode: meticulous-verifier
triggers:
  - manual
  - on_pr
  - on_commit
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Glob
cli:
  command: harness skill run enforce-architecture
  args:
    - name: path
      description: Project root path
      required: false
    - name: fix
      description: Enable auto-fix with convergence loop
      required: false
mcp:
  tool: run_skill
  input:
    skill: enforce-architecture
    path: string
type: rigid
tier: 2
state:
  persistent: false
  files: []
depends_on: []
addresses:
  - signal: circular-deps
    hard: true
  - signal: layer-violations
    hard: true
  - signal: high-coupling
    metric: fanOut
    threshold: 20
    weight: 0.8
  - signal: high-coupling
    metric: couplingRatio
    threshold: 0.7
    weight: 0.6
