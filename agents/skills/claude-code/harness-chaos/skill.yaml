name: harness-chaos
version: "1.0.0"
description: Chaos engineering, fault injection, and resilience validation
stability: static
cognitive_mode: adversarial-reviewer
triggers:
  - manual
  - on_milestone
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - emit_interaction
cli:
  command: harness skill run harness-chaos
  args:
    - name: path
      description: Project root path
      required: false
    - name: target
      description: "Target service or component for fault injection."
      required: false
    - name: blast-radius
      description: "Blast radius: single-service, namespace, or cluster. Defaults to single-service."
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-chaos
    path: string
type: rigid
tier: 3
internal: false
keywords:
  - chaos engineering
  - fault injection
  - Chaos Toolkit
  - Gremlin
  - Litmus
  - resilience
  - failure mode
  - graceful degradation
  - game day
  - disaster recovery
stack_signals:
  - "chaos/"
  - "experiments/"
  - "chaos-toolkit/"
  - "litmus/"
  - "fault-injection/"
phases:
  - name: plan
    description: Identify failure modes, define steady-state hypotheses, and scope blast radius
    required: true
  - name: inject
    description: Apply fault injection using chaos tooling against target services
    required: true
  - name: observe
    description: Monitor system behavior under fault conditions and collect metrics
    required: true
  - name: improve
    description: Analyze findings, recommend resilience improvements, and update runbooks
    required: true
state:
  persistent: false
  files: []
depends_on: []
