name: harness-containerization
version: "1.0.0"
description: Dockerfile review, Kubernetes manifests, container registry management
stability: static
cognitive_mode: meticulous-verifier
tier: 3
internal: false
keywords:
  - Docker
  - Dockerfile
  - Kubernetes
  - K8s
  - container
  - pod
  - service
  - deployment
  - Helm
  - registry
  - image
  - multi-stage
  - docker-compose
stack_signals:
  - "Dockerfile"
  - "docker-compose.*"
  - "k8s/"
  - "kubernetes/"
  - "helm/"
  - "charts/"
  - ".dockerignore"
  - "skaffold.yaml"
paths:
  - 'Dockerfile'
  - 'docker-compose*.yml'
  - 'docker-compose*.yaml'
  - '.dockerignore'
triggers:
  - manual
  - on_pr
  - on_commit
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - emit_interaction
cli:
  command: harness skill run harness-containerization
  args:
    - name: path
      description: Project root path
      required: false
    - name: scope
      description: Scope of review (dockerfile, k8s, compose, all)
      required: false
    - name: fix
      description: Auto-fix common issues (layer ordering, security)
      type: boolean
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-containerization
    path: string
type: rigid
phases:
  - name: scan
    description: Discover container configuration files and registry references
    required: true
  - name: analyze
    description: Evaluate Dockerfiles, manifests, and compose files for best practices
    required: true
  - name: optimize
    description: Recommend image size, layer, and security improvements
    required: true
  - name: validate
    description: Verify configurations are correct and deployable
    required: true
state:
  persistent: false
  files: []
depends_on: []
