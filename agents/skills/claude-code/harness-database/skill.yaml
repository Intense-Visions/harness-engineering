name: harness-database
version: "1.0.0"
description: Schema design, migrations, ORM patterns, and migration safety checks
stability: static
cognitive_mode: advisory-guide
paths:
  - '*.sql'
  - 'prisma/schema.prisma'
  - 'drizzle.config.ts'
  - 'drizzle.config.js'
  - 'knexfile.ts'
  - 'knexfile.js'
triggers:
  - manual
  - on_new_feature
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
cli:
  command: harness skill run harness-database
  args:
    - name: path
      description: Project root path
      required: false
    - name: orm
      description: "ORM/query builder: prisma, drizzle, knex, typeorm, sequelize. Auto-detected when omitted."
      required: false
    - name: check-migrations
      description: Run migration safety analysis on pending migrations
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-database
    path: string
type: rigid
tier: 3
internal: false
keywords:
  - database
  - migration
  - schema
  - ORM
  - prisma
  - knex
  - drizzle
  - typeorm
  - sequelize
  - SQL
  - DDL
  - postgresql
  - mysql
  - sqlite
  - mongodb
stack_signals:
  - "prisma/schema.prisma"
  - "drizzle.config.*"
  - "knexfile.*"
  - "migrations/"
  - "*.sql"
  - "typeorm.config.*"
  - "sequelize.config.*"
  - "src/**/models/**"
  - "src/**/entities/**"
phases:
  - name: detect
    description: Identify database engine, ORM, existing schema, and migration state
    required: true
  - name: analyze
    description: Evaluate schema design, indexing, relationships, and normalization
    required: true
  - name: advise
    description: Produce schema changes, migration scripts, and ORM pattern recommendations
    required: true
  - name: validate
    description: Verify migration safety, backward compatibility, and data integrity
    required: true
state:
  persistent: false
  files: []
depends_on: []
related_skills:
  - prisma-schema-design
  - prisma-migrations
  - drizzle-schema-definition
  - drizzle-migrations
