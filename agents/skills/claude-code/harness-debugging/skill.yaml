name: harness-debugging
version: "1.0.0"
description: Systematic debugging with harness validation and state tracking
stability: static
cognitive_mode: diagnostic-investigator
triggers:
  - manual
  - on_bug_fix
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
cli:
  command: harness skill run harness-debugging
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-debugging
    path: string
type: rigid
tier: 1
phases:
  - name: investigate
    description: Entropy analysis and root cause search
    required: true
  - name: analyze
    description: Pattern matching against codebase
    required: true
  - name: hypothesize
    description: Form and test single hypothesis
    required: false
  - name: fix
    description: TDD-style regression test and fix
    required: true
state:
  persistent: true
  files:
    - .harness/debug/
depends_on: []
addresses:
  - signal: perf-regression
    weight: 0.5
  - signal: anomaly-outlier
    weight: 0.6
