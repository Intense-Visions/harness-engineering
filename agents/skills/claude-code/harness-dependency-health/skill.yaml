name: harness-dependency-health
version: "1.0.0"
description: Analyze structural health of the codebase using graph metrics
cognitive_mode: analytical-reporter
triggers:
  - manual
  - on_milestone
platforms:
  - claude-code
  - gemini-cli
tools:
  - Bash
  - Read
  - Glob
  - Grep
cli:
  command: harness skill run harness-dependency-health
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-dependency-health
    path: string
type: rigid
tier: 2
phases:
  - name: metrics
    description: Compute graph structural metrics
    required: true
  - name: score
    description: Calculate health score and identify problems
    required: true
  - name: recommend
    description: Generate specific remediation recommendations
    required: true
state:
  persistent: false
  files: []
depends_on: []
addresses:
  - signal: high-coupling
    metric: fanOut
    threshold: 15
    weight: 0.7
  - signal: anomaly-outlier
    weight: 0.6
  - signal: articulation-point
    weight: 0.5
