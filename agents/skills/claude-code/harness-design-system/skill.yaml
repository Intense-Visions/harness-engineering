name: harness-design-system
version: "1.0.0"
description: Design token generation, palette selection, typography, spacing, and design intent management
stability: static
cognitive_mode: constructive-architect
triggers:
  - manual
  - on_new_feature
  - on_project_init
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
cli:
  command: harness skill run harness-design-system
  args:
    - name: path
      description: Project root path
      required: false
    - name: industry
      description: Industry vertical for recommendations (e.g., saas, fintech, healthcare)
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-design-system
    path: string
type: rigid
tier: 3
phases:
  - name: discover
    description: Detect existing design system, tokens, frameworks, and project context
    required: true
  - name: define
    description: Define design intent, select palette, typography, spacing scale
    required: true
  - name: generate
    description: Generate W3C DTCG tokens.json and DESIGN.md
    required: true
  - name: validate
    description: Validate tokens against schema, check contrast pairs, verify completeness
    required: true
state:
  persistent: false
  files: []
keywords:
  - design-system
  - design-tokens
  - palette
  - typography
  - spacing
  - color
  - WCAG
  - DTCG
  - CSS-variables
  - theme
  - style-guide
  - contrast
stack_signals:
  - css
  - tailwind
  - frontend
  - react
  - vue
  - svelte
  - nextjs
  - nuxt
related_skills:
  - design-token-architecture
  - design-component-anatomy
  - design-atomic-design
  - design-design-governance
  - design-naming-conventions
  - design-brand-consistency
depends_on: []
