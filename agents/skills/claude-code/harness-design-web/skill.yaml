name: harness-design-web
version: "1.0.0"
description: Token-bound web component generation with Tailwind/CSS, React/Vue/Svelte patterns, and design constraint verification
cognitive_mode: meticulous-implementer
triggers:
  - manual
  - on_new_feature
  - on_commit
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
cli:
  command: harness skill run harness-design-web
  args:
    - name: path
      description: Project root path
      required: false
    - name: framework
      description: Target framework (react, vue, svelte, vanilla)
      required: false
    - name: cssStrategy
      description: CSS strategy (tailwind, css-modules, css-in-js, vanilla)
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-design-web
    path: string
type: rigid
tier: 3
phases:
  - name: scaffold
    description: Read tokens and design intent, detect framework and CSS strategy, plan component structure
    required: true
  - name: implement
    description: Generate token-bound components with framework-specific patterns
    required: true
  - name: verify
    description: Verify all values reference tokens, no hardcoded colors/fonts/spacing, run design constraints
    required: true
state:
  persistent: false
  files: []
keywords:
  - web-components
  - token-bound
  - design-tokens
  - component-generation
  - css-strategy
  - css-modules
  - css-in-js
  - hardcoded-values
  - design-constraints
  - scaffold
  - framework-patterns
  - token-verification
stack_signals:
  - react
  - vue
  - svelte
  - tailwind
  - css
  - nextjs
  - nuxt
  - frontend
related_skills:
  - design-responsive-strategy
  - design-web-fonts
  - design-grid-systems
  - design-readability
depends_on:
  - harness-design-system
  - harness-design
