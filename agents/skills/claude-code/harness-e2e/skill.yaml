name: harness-e2e
version: "1.0.0"
description: End-to-end testing with Playwright, Cypress, and Selenium including page objects and flakiness remediation
cognitive_mode: meticulous-implementer
paths:
  - 'playwright.config.ts'
  - 'playwright.config.js'
  - 'cypress.config.ts'
  - 'cypress.config.js'
  - '*.e2e.ts'
  - '*.e2e.js'
triggers:
  - manual
  - on_new_feature
platforms:
  - claude-code
  - gemini-cli
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - emit_interaction
cli:
  command: harness skill run harness-e2e
  args:
    - name: path
      description: Project root path
      required: false
    - name: framework
      description: "E2E framework: playwright, cypress, or selenium. Auto-detected when omitted."
      required: false
    - name: scope
      description: "Test scope: smoke, critical-path, or full. Defaults to critical-path."
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-e2e
    path: string
type: rigid
tier: 3
internal: false
keywords:
  - e2e
  - end-to-end
  - Playwright
  - Cypress
  - Selenium
  - page object
  - browser testing
  - UI testing
  - flaky test
  - smoke test
  - critical path
  - user flow
  - WebDriver
stack_signals:
  - "e2e/"
  - "tests/e2e/"
  - "cypress/"
  - "playwright.config.*"
  - "cypress.config.*"
  - "selenium/"
  - "tests/browser/"
  - "*.spec.ts"
phases:
  - name: detect
    description: Identify E2E framework, existing test structure, and application entry points
    required: true
  - name: scaffold
    description: Generate page objects, test fixtures, and configuration for the target framework
    required: true
  - name: implement
    description: Write E2E tests for critical user flows with proper waits and assertions
    required: true
  - name: validate
    description: Execute tests, identify flakiness, and apply remediation patterns
    required: true
state:
  persistent: false
  files: []
depends_on: []
