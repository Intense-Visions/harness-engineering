name: harness-feature-flags
version: "1.0.0"
description: Flag lifecycle management, A/B testing infrastructure, and gradual rollouts
cognitive_mode: advisory-guide
tier: 3
internal: false
keywords:
  - feature flags
  - feature toggles
  - LaunchDarkly
  - Unleash
  - Flagsmith
  - A/B testing
  - canary
  - gradual rollout
  - kill switch
  - experiment
stack_signals:
  - "src/**/flags/**"
  - "src/**/features/**"
  - "src/**/*feature-flag*"
  - "src/**/*toggle*"
  - "flags.json"
  - "features.json"
triggers:
  - manual
  - on_new_feature
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - emit_interaction
cli:
  command: harness skill run harness-feature-flags
  args:
    - name: path
      description: Project root path
      required: false
    - name: audit
      description: Run stale flag audit to find flags past their expiry
      type: boolean
      required: false
    - name: provider
      description: Flag provider context (launchdarkly, unleash, flagsmith, custom)
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-feature-flags
    path: string
type: rigid
phases:
  - name: detect
    description: Discover flag definitions, providers, and usage patterns
    required: true
  - name: design
    description: Recommend flag architecture, naming, and rollout strategies
    required: true
  - name: validate
    description: Verify flag hygiene, test coverage, and fallback behavior
    required: true
  - name: lifecycle
    description: Audit stale flags and recommend cleanup or graduation
    required: true
state:
  persistent: false
  files: []
depends_on: []
