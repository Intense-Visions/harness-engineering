name: harness-hotspot-detector
version: "1.0.0"
description: Identify structural risk hotspots via co-change and churn analysis
cognitive_mode: analytical-reporter
triggers:
  - manual
  - on_milestone
platforms:
  - claude-code
  - gemini-cli
tools:
  - Bash
  - Read
  - Glob
  - Grep
cli:
  command: harness skill run harness-hotspot-detector
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-hotspot-detector
    path: string
type: rigid
tier: 2
phases:
  - name: co-change
    description: Analyze co-change patterns from git history
    required: true
  - name: churn
    description: Identify high-churn files and modules
    required: true
  - name: coupling
    description: Detect hidden dependencies via logical coupling
    required: true
  - name: report
    description: Generate ranked hotspot report
    required: true
state:
  persistent: false
  files: []
depends_on: []
addresses:
  - signal: high-complexity
    metric: cyclomaticComplexity
    threshold: 20
    weight: 0.9
  - signal: anomaly-outlier
    weight: 0.7
  - signal: articulation-point
    weight: 0.8
