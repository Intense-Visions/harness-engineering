name: harness-integrity
version: "1.0.0"
description: Unified integrity gate — chains verify (quick gate) with AI review into a single report
stability: static
triggers:
  - manual
  - on_pr
  - on_milestone
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Glob
  - Grep
cli:
  command: harness skill run harness-integrity
  args:
    - name: path
      description: Project root path
      required: false
    - name: change-type
      description: "Type of change: feature, bugfix, refactor, docs"
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-integrity
    path: string
type: rigid
tier: 2
cognitive_mode: meticulous-verifier
phases:
  - name: verify
    description: Run harness-verify quick gate (test, lint, typecheck)
    required: true
  - name: review
    description: Run change-type-aware AI review
    required: true
  - name: report
    description: Produce unified integrity report
    required: true
state:
  persistent: false
  files: []
depends_on:
  - harness-verify
  - harness-code-review
addresses:
  - signal: drift
    weight: 0.7
  - signal: dead-code
    weight: 0.5
