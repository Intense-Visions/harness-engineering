name: harness-planning
version: "1.0.0"
description: Structured project planning with harness constraints and validation
cognitive_mode: constructive-architect
triggers:
  - manual
  - on_new_feature
  - on_project_init
platforms:
  - claude-code
  - gemini-cli
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - emit_interaction
cli:
  command: harness skill run harness-planning
  args:
    - name: path
      description: Project root path
      required: false
    - name: fast
      description: Skip skeleton pass — produce full plan directly
      required: false
    - name: thorough
      description: Always produce skeleton for approval before full expansion
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-planning
    path: string
type: rigid
tier: 1
phases:
  - name: scope
    description: Define goals and constraints
    required: true
  - name: decompose
    description: Break work into tasks
    required: true
  - name: sequence
    description: Order tasks and identify dependencies
    required: true
  - name: validate
    description: Run harness checks on the plan
    required: true
state:
  persistent: false
  files: []
depends_on:
  - harness-verification
  - harness-soundness-review
