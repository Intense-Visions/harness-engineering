name: harness-refactoring
version: "1.0.0"
description: Safe refactoring with validation before and after changes
stability: static
cognitive_mode: meticulous-implementer
triggers:
  - manual
  - on_refactor
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
cli:
  command: harness skill run harness-refactoring
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-refactoring
    path: string
type: flexible
tier: 1
state:
  persistent: false
  files: []
depends_on: []
related_skills:
  - gof-strategy-pattern
  - gof-adapter-pattern
  - gof-facade-pattern
  - gof-decorator-pattern
addresses:
  - signal: high-complexity
    metric: cyclomaticComplexity
    threshold: 15
    weight: 0.8
  - signal: high-coupling
    metric: couplingRatio
    threshold: 0.5
    weight: 0.6
