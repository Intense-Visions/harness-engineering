name: harness-refactoring
version: "1.0.0"
description: Safe refactoring with validation before and after changes
triggers:
  - manual
  - on_refactor
platforms:
  - claude-code
  - gemini-cli
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
cli:
  command: harness skill run harness-refactoring
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-refactoring
    path: string
type: flexible
state:
  persistent: false
  files: []
depends_on: []
