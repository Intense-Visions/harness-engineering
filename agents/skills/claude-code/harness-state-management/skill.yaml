name: harness-state-management
version: "1.0.0"
description: Manage persistent session state across harness agent sessions
cognitive_mode: meticulous-implementer
triggers:
  - manual
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
cli:
  command: harness skill run harness-state-management
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-state-management
    path: string
type: flexible
internal: true
state:
  persistent: true
  files:
    - .harness/state.json
depends_on: []
related_skills:
  - state-zustand-store
  - state-zustand-slices
  - redux-slice-pattern
  - state-context-pattern
