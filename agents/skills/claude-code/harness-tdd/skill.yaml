name: harness-tdd
version: "1.0.0"
description: Test-driven development integrated with harness validation
triggers:
  - manual
  - on_new_feature
  - on_bug_fix
platforms:
  - claude-code
  - gemini-cli
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
cli:
  command: harness skill run harness-tdd
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-tdd
    path: string
type: rigid
phases:
  - name: red
    description: Write failing test
    required: true
  - name: green
    description: Implement minimal code to pass
    required: true
  - name: refactor
    description: Clean up while keeping tests green
    required: false
  - name: validate
    description: Run harness checks
    required: true
state:
  persistent: false
  files: []
depends_on:
  - harness-verification
