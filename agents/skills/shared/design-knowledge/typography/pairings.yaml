description: "Curated font pairings with complete fallback stacks and usage guidance"

pairings:
  - name: "Modern Editorial"
    tags: ["editorial", "creative", "premium"]
    display:
      family: "Instrument Serif"
      fallback: "Georgia, 'Times New Roman', serif"
      weights: [400, 700]
      variable: false
      source: "Google Fonts"
    body:
      family: "Geist"
      fallback: "system-ui, -apple-system, sans-serif"
      weights: [400, 500, 600]
      variable: true
      source: "Vercel"
    mono:
      family: "Geist Mono"
      fallback: "'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
      weights: [400, 500]
      source: "Vercel"
    scale:
      base: "1rem"
      ratio: 1.25
      sizes:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.25rem"
        "2xl": "1.5rem"
        "3xl": "1.875rem"
        "4xl": "2.25rem"
        "5xl": "3rem"
    usage: "Best for editorial, blog, and content-heavy sites that want to feel premium and literary."

  - name: "Clean Tech"
    tags: ["tech", "saas", "dashboard", "modern"]
    display:
      family: "Inter"
      fallback: "system-ui, -apple-system, 'Segoe UI', sans-serif"
      weights: [500, 600, 700]
      variable: true
      source: "Google Fonts"
    body:
      family: "Inter"
      fallback: "system-ui, -apple-system, 'Segoe UI', sans-serif"
      weights: [400, 500, 600]
      variable: true
      source: "Google Fonts"
    mono:
      family: "JetBrains Mono"
      fallback: "'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
      weights: [400, 500]
      source: "Google Fonts"
    scale:
      base: "1rem"
      ratio: 1.2
      sizes:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.25rem"
        "2xl": "1.5rem"
        "3xl": "1.8rem"
        "4xl": "2.16rem"
        "5xl": "2.592rem"
    usage: "Ideal for SaaS dashboards, developer tools, and data-heavy interfaces where clarity and density matter."

  - name: "Traditional Pro"
    tags: ["professional", "corporate", "legal", "finance"]
    display:
      family: "Playfair Display"
      fallback: "Georgia, 'Times New Roman', 'Palatino Linotype', serif"
      weights: [400, 700, 900]
      variable: true
      source: "Google Fonts"
    body:
      family: "Source Sans 3"
      fallback: "'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      weights: [400, 600, 700]
      variable: true
      source: "Google Fonts"
    mono:
      family: "Source Code Pro"
      fallback: "'SF Mono', 'Courier New', monospace"
      weights: [400, 500]
      source: "Google Fonts"
    scale:
      base: "1rem"
      ratio: 1.333
      sizes:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.333rem"
        "2xl": "1.777rem"
        "3xl": "2.369rem"
        "4xl": "3.157rem"
        "5xl": "4.209rem"
    usage: "Best for corporate sites, law firms, financial services, and publications that need gravitas and authority."

  - name: "Friendly Rounded"
    tags: ["friendly", "approachable", "lifestyle", "consumer"]
    display:
      family: "Nunito"
      fallback: "'Varela Round', 'Helvetica Neue', Arial, sans-serif"
      weights: [600, 700, 800]
      variable: true
      source: "Google Fonts"
    body:
      family: "DM Sans"
      fallback: "'Helvetica Neue', Arial, sans-serif"
      weights: [400, 500, 700]
      variable: true
      source: "Google Fonts"
    mono:
      family: "DM Mono"
      fallback: "'SF Mono', 'Fira Code', monospace"
      weights: [400, 500]
      source: "Google Fonts"
    scale:
      base: "1rem"
      ratio: 1.25
      sizes:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.25rem"
        "2xl": "1.5rem"
        "3xl": "1.875rem"
        "4xl": "2.25rem"
        "5xl": "3rem"
    usage: "Perfect for consumer apps, lifestyle brands, and friendly SaaS products that want to feel warm and approachable."

  - name: "Geometric Minimal"
    tags: ["minimal", "geometric", "startup", "clean"]
    display:
      family: "Space Grotesk"
      fallback: "'Helvetica Neue', Arial, sans-serif"
      weights: [500, 700]
      variable: true
      source: "Google Fonts"
    body:
      family: "Work Sans"
      fallback: "'Helvetica Neue', Arial, sans-serif"
      weights: [400, 500, 600]
      variable: true
      source: "Google Fonts"
    mono:
      family: "Space Mono"
      fallback: "'SF Mono', 'Courier New', monospace"
      weights: [400, 700]
      source: "Google Fonts"
    scale:
      base: "1rem"
      ratio: 1.2
      sizes:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.25rem"
        "2xl": "1.5rem"
        "3xl": "1.8rem"
        "4xl": "2.16rem"
        "5xl": "2.592rem"
    usage: "Great for startups, portfolios, and minimal landing pages that favor geometric precision over ornamentation."

  - name: "Monospace Forward"
    tags: ["developer", "technical", "code", "hacker"]
    display:
      family: "JetBrains Mono"
      fallback: "'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
      weights: [500, 700, 800]
      variable: true
      source: "Google Fonts"
    body:
      family: "IBM Plex Sans"
      fallback: "'Helvetica Neue', Arial, sans-serif"
      weights: [400, 500, 600]
      variable: false
      source: "Google Fonts"
    mono:
      family: "JetBrains Mono"
      fallback: "'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
      weights: [400, 500]
      source: "Google Fonts"
    scale:
      base: "1rem"
      ratio: 1.2
      sizes:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.25rem"
        "2xl": "1.5rem"
        "3xl": "1.8rem"
        "4xl": "2.16rem"
        "5xl": "2.592rem"
    usage: "Tailored for developer tools, documentation sites, and technical blogs where code is a first-class citizen."

  - name: "High Contrast A11y"
    tags: ["accessible", "healthcare", "government", "high-contrast"]
    display:
      family: "Atkinson Hyperlegible"
      fallback: "Arial, 'Helvetica Neue', sans-serif"
      weights: [400, 700]
      variable: false
      source: "Google Fonts"
    body:
      family: "Atkinson Hyperlegible"
      fallback: "Arial, 'Helvetica Neue', sans-serif"
      weights: [400, 700]
      variable: false
      source: "Google Fonts"
    mono:
      family: "Red Hat Mono"
      fallback: "'SF Mono', 'Courier New', monospace"
      weights: [400, 700]
      source: "Google Fonts"
    scale:
      base: "1.125rem"
      ratio: 1.25
      sizes:
        xs: "0.875rem"
        sm: "1rem"
        base: "1.125rem"
        lg: "1.25rem"
        xl: "1.5rem"
        "2xl": "1.875rem"
        "3xl": "2.25rem"
        "4xl": "3rem"
        "5xl": "3.75rem"
    usage: "Designed for maximum legibility. Ideal for healthcare, government, education, and any context where accessibility is paramount."

  - name: "System Native"
    tags: ["system", "performance", "native", "zero-download"]
    display:
      family: "system-ui"
      fallback: "-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
      weights: [500, 600, 700]
      variable: false
      source: "System"
    body:
      family: "system-ui"
      fallback: "-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
      weights: [400, 500, 600]
      variable: false
      source: "System"
    mono:
      family: "ui-monospace"
      fallback: "'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace"
      weights: [400, 500]
      source: "System"
    scale:
      base: "1rem"
      ratio: 1.25
      sizes:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.25rem"
        "2xl": "1.5rem"
        "3xl": "1.875rem"
        "4xl": "2.25rem"
        "5xl": "3rem"
    usage: "Zero font downloads, instant rendering. Best for performance-critical apps, internal tools, and native-feeling web applications."
