services:
  orchestrator:
    build:
      context: .
      target: orchestrator
    ports:
      - "8080:8080"
    volumes:
      - ./:/project:ro
      - workspaces:/app/.harness/workspaces
      # Uncomment for container-based agent execution:
      # - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HARNESS_PROJECT_PATH=/project
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/state"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "3701:3701"
    volumes:
      - ./:/project:ro
    environment:
      - HARNESS_PROJECT_PATH=/project
      - ORCHESTRATOR_URL=http://orchestrator:8080
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3701/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  workspaces:
