# Headless Agent — GitHub Action
# Runs harness checks and personas automatically in response to issue/PR events.
# Copy to .github/workflows/headless-agent.yml in your project.

name: Headless Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Run architecture enforcer when issue labeled "needs-review"
  auto-review:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'needs-review'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install harness CLI
        run: npm install -g @harness-engineering/cli

      - name: Run architecture enforcer persona
        id: review
        run: |
          harness agent run --persona architecture-enforcer --timeout 60000 > review-output.txt 2>&1 || true
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post results
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f review-output.txt ] && [ -s review-output.txt ]; then
            {
              echo "## Architecture Review"
              echo ""
              echo '```'
              cat review-output.txt
              echo '```'
              echo ""
              echo "---"
              echo "*Generated by harness headless agent (architecture-enforcer persona)*"
            } > comment-body.md
            gh issue comment ${{ github.event.issue.number }} --body-file comment-body.md
          else
            gh issue comment ${{ github.event.issue.number }} \
              --body "Architecture review could not complete. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

  # Run entropy check when issue labeled "check-entropy"
  auto-entropy:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'check-entropy'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install harness CLI
        run: npm install -g @harness-engineering/cli

      - name: Run entropy checks
        run: harness ci check --json --skip deps,phase-gate > report.json || true

      - name: Post results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(jq -r '"**Harness Entropy Report**\n\n| Check | Status | Issues |\n|-------|--------|--------|\n" + ([.checks[] | "| " + .name + " | " + .status + " | " + (.issues | length | tostring) + " |"] | join("\n"))' report.json)
          gh issue comment ${{ github.event.issue.number }} --body "$SUMMARY"

  # Run harness check when PR comment contains "/harness check"
  on-demand-check:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/harness check')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get PR ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF=$(gh pr view ${{ github.event.issue.number }} --json headRefName -q '.headRefName')
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and run
        run: |
          npm install -g @harness-engineering/cli
          harness ci check --json > report.json || true

      - name: Post results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(jq -r '"**Harness Check Results**\n\n| Check | Status | Issues |\n|-------|--------|--------|\n" + ([.checks[] | "| " + .name + " | " + .status + " | " + (.issues | length | tostring) + " |"] | join("\n")) + "\n\n**Exit code:** " + (.exitCode | tostring)' report.json)
          gh pr comment ${{ github.event.issue.number }} --body "$SUMMARY"
