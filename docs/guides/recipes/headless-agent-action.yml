# Headless Agent — GitHub Action
# Runs harness agent skills automatically in response to issue/PR events.
# Copy to .github/workflows/headless-agent.yml in your project.

name: Headless Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Run brainstorming when issue labeled "needs-spec"
  auto-spec:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'needs-spec'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install harness CLI
        run: npm install -g @harness-engineering/cli

      - name: Extract issue context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ github.event.issue.number }} \
            --json title,body \
            -q '"# " + .title + "\n\n" + .body' > context.md

      - name: Run brainstorming agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
        run: |
          harness agent run \
            --headless \
            --skill harness-brainstorming \
            --context context.md \
            --output spec-draft.md \
            --timeout 300 || echo "Agent exited with code $?"

      - name: Post spec draft
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f spec-draft.md ] && [ -s spec-draft.md ]; then
            {
              echo "## Auto-Generated Spec Draft"
              echo ""
              cat spec-draft.md
              echo ""
              echo "---"
              echo "*Generated by harness headless agent. Review and refine before implementation.*"
            } > comment-body.md
            gh issue comment ${{ github.event.issue.number }} --body-file comment-body.md
          else
            gh issue comment ${{ github.event.issue.number }} \
              --body "Headless agent could not generate a spec draft. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

  # Run planning when issue labeled "needs-plan"
  auto-plan:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'needs-plan'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install harness CLI
        run: npm install -g @harness-engineering/cli

      - name: Extract issue context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ github.event.issue.number }} \
            --json title,body \
            -q '"# " + .title + "\n\n" + .body' > context.md

      - name: Run planning agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
        run: |
          harness agent run \
            --headless \
            --skill harness-planning \
            --context context.md \
            --output plan-draft.md \
            --timeout 300 || echo "Agent exited with code $?"

      - name: Post plan draft
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f plan-draft.md ] && [ -s plan-draft.md ]; then
            {
              echo "## Auto-Generated Plan Draft"
              echo ""
              cat plan-draft.md
              echo ""
              echo "---"
              echo "*Generated by harness headless agent. Review before execution.*"
            } > comment-body.md
            gh issue comment ${{ github.event.issue.number }} --body-file comment-body.md
          else
            gh issue comment ${{ github.event.issue.number }} \
              --body "Headless agent could not generate a plan. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

  # Run harness check when PR comment contains "/harness check"
  on-demand-check:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/harness check')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get PR ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF=$(gh pr view ${{ github.event.issue.number }} --json headRefName -q '.headRefName')
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and run
        run: |
          npm install -g @harness-engineering/cli
          harness ci check --json > report.json || true

      - name: Post results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(jq -r '"**Harness Check Results**\n\n| Check | Status | Issues |\n|-------|--------|--------|\n" + ([.checks[] | "| " + .name + " | " + .status + " | " + (.issues | length | tostring) + " |"] | join("\n")) + "\n\n**Exit code:** " + (.exitCode | tostring)' report.json)
          gh pr comment ${{ github.event.issue.number }} --body "$SUMMARY"
