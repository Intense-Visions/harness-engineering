version: 1
output: ./generated/eslint-rules

rules:
  - name: no-direct-db-access
    type: import-restriction
    severity: error
    config:
      source: 'src/api/**'
      forbiddenImports:
        - 'src/data/**'
        - 'pg'
        - 'mysql2'
        - 'mongodb'
      message: 'API layer must not access database directly — use services layer'
