name: harness-test-skill
version: "1.0.0"
description: A test skill for unit tests
cognitive_mode: meticulous-implementer
type: rigid
triggers:
  - manual
platforms:
  - claude-code
  - gemini-cli
tools:
  - Read
  - Write
  - Bash
cli:
  command: harness skill run harness-test-skill
  args:
    - name: path
      description: Project root path
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-test-skill
    path: string
phases:
  - name: execute
    description: Run the test workflow
    required: true
state:
  persistent: true
  files:
    - .harness/state.json
